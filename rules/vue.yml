multi_line_comment: "<!--,-->"

multi_line_string: "`,`"

constant: "true,false,undefined,null,number,string,boolean,root,rgb,rgba,calc,media"

entity_prefix:
  ENTITY_DOT: "."

entity_suffix:
  left_brace: (
  colon: ":"

entity_tag: "template,style,html,head,title,meta,link,body,div,span,applet,object,iframe,h1,h2,h3,h4,h5,h6,p,blockquote,button,pre,a,abbr,acronym,address,big,cite,code,del,dfn,em,img,ins,kbd,q,s,samp,select,small,strike,strong,sub,sup,script,tt,b,u,i,center,dl,dt,dd,ol,ul,li,fieldset,form,label,legend,table,caption,tbody,tfoot,thead,tr,th,td,article,canvas,embed,output,ruby,summary,time,mark,audio,videoarticle,aside,details,figcaption,figure,footer,header,hgroup,menu,nav,section,video,textarea,input,hr"

entity: "after,before,hover,not,focus,active,selection,px,rem"

keyword: "async,await,break,as,switch,case,if,throw,else,var,get,module,instanceof,import,from,typeof,public,private,enum,export,finally,for,while,void,super,this,in,return,any,extends,static,let,package,implements,interface,function,new,try,yield,const,continue,do,catch,default,class,debugger,delete,protected,with,readonly,declare,namespace,keyof,infer,type,important,v-if,v-else,v-else-if,v-for,v-show,v-model,v-bind,v-on,v-slot,v-pre,v-once,v-memo,v-html,v-text,defineProps,defineEmits,defineExpose,defineModel,withDefaults,ref,reactive,computed,watch,onMounted,onUnmounted"

var: "Infinity,NaN,Math,Date"

condition:
  ACCEPT_ESCAPED_STRING: true
  ACCEPT_STRING_ONE_QUOTE: true
  ACCEPT_STRING_DOUBLE_QUOTE: true
  RENDER_MULTI_LINE_STRING: true
  ACCEPT_CHAR_IDENTIFIER: "?"
  ACCEPT_ENTITY_SUFFIX: self.ch.is_numeric()
  BREAK_ENTITY_SUFFIX: "self.ch == ' ' || self.ch == ':' || self.ch == ':' || self.ch == '(' || self.ch == '{' || self.ch == '\\n'"
  MARK_KEYWORD_AS_ENTITY_ON_PREFIX: "."
  PREFIX_ONE_LINE_COMMENT: //
  ENCODE_LT: "<"
  ENCODE_LT_STRING: "&lt;"
  ENCODE_GT: ">"
  ENCODE_GT_STRING: "&gt;"
  ACCEPT_DASH_IDENTIFIER: "-"
  ACCEPT_CONSTANT_SUFFIX_IDENTIFIER: true
  ACCEPT_ENTITY_TAG_SUFFIX: self.ch.is_numeric()
  BREAK_ENTITY_TAG_SUFFIX: "!self.ch.is_numeric() && !is_letter(self.ch)"
  ACCEPT_HEXADECIMAL_NUMBER: true
  MARK_PASCALCASE_ENTITYTAG_IN_TAG: true
  MARK_VUE_SFC_SECTIONS: true
  ACCEPT_PREFIX_KEYWORD: "#"
