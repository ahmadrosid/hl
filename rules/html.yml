  ENCODE_LT: "<"
  ENCODE_LT_STRING: "&lt;"
  ENCODE_GT: ">"
  ENCODE_GT_STRING: "&gt;"
  PREFIX_ONE_LINE_COMMENT: //
  MARK_HTML_EMBEDDED_SECTIONS: true
